services:
  - type: web
    name: e-learning-backend
    env: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

  - type: web
    name: e-learning-frontend
    runtime: node
    plan: free
    buildCommand: cd client && npm install && npm run build
    startCommand: cd client && npx serve -s dist -l 3000
    envVars:
      - key: VITE_API_URL
        value: https://e-learning-backend.onrender.com